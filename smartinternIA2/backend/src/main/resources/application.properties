# ── Base de données MySQL (WAMP) ───────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smartintern_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
