# ── Serveur ────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8081}

# ── Base de données MySQL ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smartintern_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate / JPA ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ────────────────────────────────────────────────────────────────────
# Variable d'environnement obligatoire en production — voir .env.example
jwt.secret=${JWT_SECRET:SmartInternAI_SuperSecretKey_2024_XYZ123456789_ChangeInProd}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── CORS ───────────────────────────────────────────────────────────────────
spring.main.allow-circular-references=true

# ── Upload fichiers ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Email Gmail SMTP ───────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:smartinternainoreply@gmail.com}
# Mot de passe d'application Gmail (variable obligatoire en production)
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Microservice Python CV (port 8000) ─────────────────────────────────────
cv.service.url=${CV_SERVICE_URL:http://localhost:8000}

# ── Frontend ───────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:5500}
